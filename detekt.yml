build:
  maxIssues: 0

config:
  validation: true

style:
  ReturnCount:
    active: false
  MaxLineLength:
    active: true
    maxLineLength: 120
  MagicNumber:
    active: false
  WildcardImport:
    active: false
  UnusedPrivateMember:
    active: false

complexity:
  LongMethod:
    threshold: 80
  LongParameterList:
    active: false
  CyclomaticComplexMethod:
    active: false

naming:
  FunctionNaming:
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*(\`.*\`)?'
  MatchingDeclarationName:
    active: false

exceptions:
  TooGenericExceptionThrown:
    active: false
  TooGenericExceptionCaught:
    active: false
